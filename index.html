<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Neo 3 Firmware</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0b0b;
--card:#141414;
--text:#e6e6e6;
--accent:#4da3ff;
--border:#222;
}

.light{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111;
--accent:#2c7efc;
--border:#ddd;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.4s;
}

header{
display:flex;
justify-content:space-between;
padding:25px 10%;
border-bottom:1px solid var(--border);
}

.logo{
font-weight:600;
letter-spacing:2px;
}

.toggle{
cursor:pointer;
border:1px solid var(--border);
padding:8px 14px;
border-radius:8px;
background:var(--card);
}

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.version{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.region{
opacity:.6;
margin-bottom:12px;
}

.download{
display:inline-block;
padding:8px 16px;
background:var(--accent);
border-radius:8px;
color:white;
text-decoration:none;
font-size:14px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:var(--card);
padding:35px;
border-radius:14px;
text-align:center;
animation:pop .35s ease;
}

.modal button{
margin:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<header>

<div class="logo">GT NEO 3 OTA</div>

<div class="toggle" onclick="toggleTheme()">Theme</div>

</header>

<div class="container">

<div id="firmwareList" class="grid">

<div class="card" data-android="14">
<div class="version">RMX3561_14.0.0.501</div>
<div class="region">Android 14 • Global</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="14">
<div class="version">RMX3561_14.0.0.420</div>
<div class="region">Android 14 • India</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="13">
<div class="version">RMX3561_13.1.0.181</div>
<div class="region">Android 13 • India</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="13">
<div class="version">RMX3561_13.1.0.150</div>
<div class="region">Android 13 • EU</div>
<a class="download" href="#">Download</a>
</div>

</div>

</div>

<div id="versionModal" class="modal">

<div class="modal-box">

<h2>Select Android Version</h2>
<br>

<button onclick="filterFirmware('14')">Android 14</button>
<button onclick="filterFirmware('13')">Android 13</button>

</div>

</div>

<script>

function toggleTheme(){
document.body.classList.toggle("light")
}

function filterFirmware(version){

document.getElementById("versionModal").classList.add("hidden")

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
if(card.dataset.android===version){
card.style.display="block"
}else{
card.style.display="none"
}
})

}

</script>

</body>
</html>
