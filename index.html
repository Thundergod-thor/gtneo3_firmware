<!DOCTYPE html>
<html lang="en">

<!-- ================= HEAD ================= -->

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Neo 3 Stock Firmware Files</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= ROOT COLORS ================= */

:root{
--bg:#0b0b0b;
--card:#141414;
--text:#e6e6e6;
--accent:#4da3ff;
--border:#222;
}

.light{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111;
--accent:#2c7efc;
--border:#ddd;
}

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.4s;
}

/* ================= HEADER ================= */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
border-bottom:1px solid var(--border);
flex-wrap:wrap;
gap:10px;
}

.logo{
font-weight:600;
letter-spacing:2px;
}

.header-right{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

/* ================= THEME BUTTON ================= */

.theme-btn{
width:42px;
height:42px;
border-radius:50%;
border:1px solid var(--border);
background:var(--card);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
transition:.4s;
}

.theme-btn:hover{
transform:rotate(180deg) scale(1.1);
}

/* ================= TELEGRAM BUTTON ================= */

.telegram{
padding:8px 14px;
background:#229ED9;
color:white;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

/* ================= MAIN CONTAINER ================= */

.container{
max-width:1000px;
margin:auto;
padding:40px 18px;
}

/* ================= REGION FILTERS ================= */

.filters{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filter-btn{
padding:6px 12px;
border:1px solid var(--border);
background:var(--card);
border-radius:8px;
cursor:pointer;
font-size:13px;
transition:.2s;
}

.filter-btn.active{
background:var(--accent);
color:white;
border-color:var(--accent);
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:18px;
}

/* ================= FIRMWARE CARD ================= */

.card{
background:var(--card);
padding:18px;
border-radius:12px;
border:1px solid var(--border);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.version{
font-size:17px;
font-weight:600;
margin-bottom:6px;
}

.region{
opacity:.6;
margin-bottom:12px;
font-size:14px;
}

/* ================= BUTTON GROUP ================= */

.btn-group{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.download{
padding:8px 14px;
background:var(--accent);
border-radius:8px;
color:white;
text-decoration:none;
font-size:13px;
}

.copy{
padding:8px 12px;
background:var(--accent);
color:white;
border:1px solid var(--accent);
border-radius:8px;
cursor:pointer;
font-size:13px;
transition:.2s;
}

.copy:hover{
opacity:.85;
}

/* ================= MODAL ================= */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:var(--card);
padding:35px;
border-radius:14px;
text-align:center;
animation:pop .35s ease;
}

.modal button{
margin:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

/* ================= BACK BUTTON ================= */

.back{
margin-bottom:20px;
padding:8px 14px;
background:var(--accent);
border:1px solid var(--border);
border-radius:8px;
cursor:pointer;
}

/* ================= SCROLL PROGRESS ================= */

.scroll-progress{
position:fixed;
bottom:18px;
right:18px;
width:44px;
height:44px;
opacity:0;
transform:scale(.7);
pointer-events:none;
transition:opacity .25s ease, transform .25s ease;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.scroll-progress.visible{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* SVG ring */

.scroll-progress svg{
position:absolute;
transform:rotate(-90deg);
}

.scroll-progress circle{
fill:none;
stroke-width:4;
}

.scroll-progress circle:first-child{
stroke:var(--border);
}

#progressCircle{
stroke:var(--accent);
stroke-dasharray:113;
stroke-dashoffset:113;
transition:stroke-dashoffset .2s linear;
}

/* arrow */

.scroll-arrow{
font-size:16px;
opacity:0;
transform:translateY(4px);
transition:opacity .2s ease, transform .2s ease;
color:var(--text);
}

/* hover reveal */

.scroll-progress:hover .scroll-arrow{
opacity:1;
transform:translateY(0);
}

.scroll-progress:hover svg{
opacity:.3;
}

/* ================= MOBILE FIX ================= */

@media(max-width:600px){

header{
padding:16px;
}

.logo{
font-size:14px;
}

.container{
padding:30px 14px;
}

.grid{
grid-template-columns:1fr;
}

}

/* ================= ANIMATION ================= */

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>


<!-- ================= BODY ================= -->

<body>

<!-- ================= HEADER ================= -->

<header>

<div class="logo">GT NEO 3 OTA</div>

<div class="header-right">

<a class="telegram" href="https://t.me/RealmeGTNeo3discussion" target="_blank">Join Telegram</a>

<button class="theme-btn" onclick="toggleTheme()">
<span class="icon">🌙</span>
</button>

</div>

</header>


<!-- ================= MAIN CONTAINER ================= -->

<div class="container">

<button id="backBtn" class="back hidden" onclick="goBack()">← Back</button>


<!-- ================= REGION FILTER ================= -->

<div class="filters">

<button class="filter-btn" onclick="filterRegion('all')">All</button>
<button class="filter-btn" onclick="filterRegion('IN')">IN</button>
<button class="filter-btn" onclick="filterRegion('CN')">CN</button>
<button class="filter-btn" onclick="filterRegion('ID')">ID</button>
<button class="filter-btn" onclick="filterRegion('EU')">EU</button>

</div>


<!-- ================= FIRMWARE GRID ================= -->

<div id="firmwareList" class="grid">

<div class="card" data-android="14" data-region="IN">
<div class="version">RMX3561_14.0.0.501</div>
<div class="region">Android 14 • IN</div>

<div class="btn-group">
<a class="download" href="#">Download</a>
<button class="copy" onclick="copyLink(this)">Copy Link</button>
</div>

</div>


<div class="card" data-android="14" data-region="EU">
<div class="version">RMX3561_14.0.0.420</div>
<div class="region">Android 14 • EU</div>

<div class="btn-group">
<a class="download" href="#">Download</a>
<button class="copy" onclick="copyLink(this)">Copy Link</button>
</div>

</div>


<div class="card" data-android="13" data-region="CN">
<div class="version">RMX3561_13.1.0.181</div>
<div class="region">Android 13 • CN</div>

<div class="btn-group">
<a class="download" href="#">Download</a>
<button class="copy" onclick="copyLink(this)">Copy Link</button>
</div>

</div>


<div class="card" data-android="13" data-region="ID">
<div class="version">RMX3561_13.1.0.150</div>
<div class="region">Android 13 • ID</div>

<div class="btn-group">
<a class="download" href="#">Download</a>
<button class="copy" onclick="copyLink(this)">Copy Link</button>
</div>

</div>

</div>

</div>


<!-- ================= ANDROID SELECT MODAL ================= -->

<div id="versionModal" class="modal">

<div class="modal-box">

<h2>Select Android Version</h2>
<br>

<button onclick="filterFirmware('14')">Android 14</button>
<button onclick="filterFirmware('13')">Android 13</button>

</div>

</div>


<!-- ================= SCROLL INDICATOR ================= -->

<div class="scroll-progress">

<svg width="44" height="44">

<circle cx="22" cy="22" r="18"></circle>
<circle id="progressCircle" cx="22" cy="22" r="18"></circle>

</svg>

<div class="scroll-arrow">↑</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

/* ================= THEME TOGGLE ================= */

function toggleTheme(){

document.body.classList.toggle("light")

let icon=document.querySelector(".icon")

if(document.body.classList.contains("light")){
icon.textContent="☀️"
}else{
icon.textContent="🌙"
}

}

/* ================= ANDROID FILTER ================= */

function filterFirmware(version){

document.getElementById("versionModal").classList.add("hidden")
document.getElementById("backBtn").classList.remove("hidden")

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
if(card.dataset.android===version){
card.style.display="block"
}else{
card.style.display="none"
}
})

}

/* ================= BACK BUTTON ================= */

function goBack(){

document.getElementById("versionModal").classList.remove("hidden")
document.getElementById("backBtn").classList.add("hidden")

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
card.style.display="block"
})

}

/* ================= REGION FILTER ================= */

function filterRegion(region){

let cards=document.querySelectorAll(".card")
let buttons=document.querySelectorAll(".filter-btn")

/* highlight active region */

buttons.forEach(btn=>{
btn.classList.remove("active")
})

event.target.classList.add("active")

/* filter cards */

cards.forEach(card=>{

if(region==="all" || card.dataset.region===region){
card.style.display="block"
}else{
card.style.display="none"
}

})

}

/* ================= COPY LINK ================= */

function copyLink(btn){

let url=btn.parentElement.querySelector(".download").href

navigator.clipboard.writeText(url)

btn.innerText="Copied!"

setTimeout(()=>{
btn.innerText="Copy Link"
},1500)

}

/* ================= SCROLL PROGRESS ================= */

const progressCircle=document.getElementById("progressCircle")
const progressContainer=document.querySelector(".scroll-progress")

const circumference=113

window.addEventListener("scroll",()=>{

let scrollTop=document.documentElement.scrollTop
let scrollHeight=document.documentElement.scrollHeight - document.documentElement.clientHeight

let progress=scrollTop/scrollHeight

/* progress ring */

progressCircle.style.strokeDashoffset=circumference-(progress*circumference)

/* show after 40% scroll */

if(progress>0.4){
progressContainer.classList.add("visible")
}else{
progressContainer.classList.remove("visible")
}

})

/* scroll to top */

progressContainer.addEventListener("click",()=>{

window.scrollTo({
top:0,
behavior:"smooth"
})

})

</script>

</body>
</html>
