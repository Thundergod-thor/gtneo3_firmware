<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Neo 3 Firmware</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0b0b;
--card:#141414;
--text:#e6e6e6;
--accent:#4da3ff;
--border:#222;
}

.light{
--bg:#f5f5f5;
--card:#ffffff;
--text:#111;
--accent:#2c7efc;
--border:#ddd;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.4s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 10%;
border-bottom:1px solid var(--border);
}

.logo{
font-weight:600;
letter-spacing:2px;
}

.header-right{
display:flex;
gap:12px;
align-items:center;
}

.theme-btn{
width:42px;
height:42px;
border-radius:50%;
border:1px solid var(--border);
background:var(--card);
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
transition:.4s;
}

.theme-btn:hover{
transform:rotate(180deg) scale(1.1);
}

.telegram{
padding:8px 14px;
background:#229ED9;
color:white;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

.container{
max-width:1000px;
margin:auto;
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.version{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.region{
opacity:.6;
margin-bottom:12px;
}

.download{
display:inline-block;
padding:8px 16px;
background:var(--accent);
border-radius:8px;
color:white;
text-decoration:none;
font-size:14px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:var(--card);
padding:35px;
border-radius:14px;
text-align:center;
animation:pop .35s ease;
}

.modal button{
margin:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:var(--accent);
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

.back{
margin-bottom:20px;
padding:8px 14px;
background:var(--accent);
border:1px solid var(--border);
border-radius:8px;
cursor:pointer;
}

.scroll-progress{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
}

.scroll-progress svg{
transform:rotate(-90deg);
}

.scroll-progress circle{
fill:none;
stroke-width:6;
}

.scroll-progress circle:first-child{
stroke:var(--border);
}

#progressCircle{
stroke:var(--accent);
stroke-dasharray:163;
stroke-dashoffset:163;
transition:stroke-dashoffset .2s linear;
}

@keyframes pop{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<header>

<div class="logo">GT NEO 3 OTA</div>

<div class="header-right">

<a class="telegram" href="https://t.me/RealmeGTNeo3discussion" target="_blank">Join Telegram Community</a>

<button id="themeToggle" class="theme-btn" onclick="toggleTheme()">
<span class="icon">🌙</span>
</button>

</div>

</header>

<div class="container">

<button id="backBtn" class="back hidden" onclick="goBack()">← Back</button>

<div id="firmwareList" class="grid">

<div class="card" data-android="14">
<div class="version">RMX3561_14.0.0.501</div>
<div class="region">Android 14 • Global</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="14">
<div class="version">RMX3561_14.0.0.420</div>
<div class="region">Android 14 • India</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="13">
<div class="version">RMX3561_13.1.0.181</div>
<div class="region">Android 13 • India</div>
<a class="download" href="#">Download</a>
</div>

<div class="card" data-android="13">
<div class="version">RMX3561_13.1.0.150</div>
<div class="region">Android 13 • EU</div>
<a class="download" href="#">Download</a>
</div>

</div>

</div>

<div id="versionModal" class="modal">

<div class="modal-box">

<h2>Select Android Version</h2>
<br>

<button onclick="filterFirmware('14')">Android 14</button>
<button onclick="filterFirmware('13')">Android 13</button>

</div>

</div>

<div class="scroll-progress">
<svg width="60" height="60">
<circle cx="30" cy="30" r="26"></circle>
<circle id="progressCircle" cx="30" cy="30" r="26"></circle>
</svg>
</div>

<script>

function toggleTheme(){

document.body.classList.toggle("light")

let icon=document.querySelector(".icon")

if(document.body.classList.contains("light")){
icon.textContent="☀️"
}else{
icon.textContent="🌙"
}

}

function filterFirmware(version){

document.getElementById("versionModal").classList.add("hidden")
document.getElementById("backBtn").classList.remove("hidden")

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
if(card.dataset.android===version){
card.style.display="block"
}else{
card.style.display="none"
}
})

}

function goBack(){

document.getElementById("versionModal").classList.remove("hidden")
document.getElementById("backBtn").classList.add("hidden")

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
card.style.display="block"
})

}

window.addEventListener("scroll",()=>{

let scrollTop=document.documentElement.scrollTop
let scrollHeight=document.documentElement.scrollHeight - document.documentElement.clientHeight

let progress=(scrollTop/scrollHeight)

let circle=document.getElementById("progressCircle")

let circumference=163

circle.style.strokeDashoffset=circumference-(progress*circumference)

})

</script>

</body>
</html>
